<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zortengine Demo Oyunu</title>
    <style>
        :root {
            color-scheme: dark;
        }
        html, body {
            width: 100%;
            height: 100%;
        }
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background:
                radial-gradient(circle at 12% 16%, rgba(39, 174, 96, 0.16), transparent 24%),
                radial-gradient(circle at 84% 18%, rgba(52, 152, 219, 0.16), transparent 20%),
                radial-gradient(circle at 60% 84%, rgba(34, 211, 238, 0.08), transparent 18%),
                linear-gradient(180deg, #040812 0%, #060b16 52%, #0a101c 100%);
        }
        canvas { 
            display: block; 
            width: 100vw;
            height: 100vh;
        }
    </style>
    
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    
    <!-- Modern İçe Aktarma Haritası (Import Map) -->
    <!-- Bu sayede üç boyutlu objeler birbirinin modüllerini sorunsuz bulur -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.0/examples/jsm/",
            "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.166.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
            "zortengine": "../../../src/engine/index.js",
            "zortengine/audio": "../../../src/adapters/audio/index.js",
            "zortengine/assets": "../../../src/engine/assets/index.js",
            "zortengine/browser": "../../../src/adapters/browser/index.js",
            "zortengine/devtools": "../../../src/tooling/index.js",
            "zortengine/gameplay": "../../../src/gameplay/index.js",
            "zortengine/kits": "../../../src/kits/index.js",
            "zortengine/networking": "../../../src/kits/networking/index.js",
            "zortengine/objects": "../../../src/objects/index.js",
            "zortengine/persistence": "../../../src/persistence/index.js",
            "zortengine/physics": "../../../src/adapters/physics/index.js",
            "zortengine/render": "../../../src/adapters/render/index.js"
        }
    }
    </script>
</head>
<body>
    <!-- Modüler giriş noktamız -->
    <script type="module" src="main.js"></script>
</body>
</html>
