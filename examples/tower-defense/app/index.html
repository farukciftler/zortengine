<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZortEngine TD</title>
    <style>
        :root { color-scheme: dark; }
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .panel { background: rgba(15, 20, 30, 0.85); backdrop-filter: blur(10px); color: #fff; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        .hidden { display: none !important; }
        
        #main-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        #main-menu h1 { margin: 0; font-size: 3rem; color: #4facfe; text-shadow: 0 0 10px #4facfe; }
        .btn { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); border: none; padding: 10px 30px; border-radius: 20px; color: #fff; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #00f2fe; }

        #hud { position: absolute; top: 20px; left: 20px; display: flex; gap: 20px; }
        .hud-stat { font-size: 1.2rem; font-weight: bold; }
        .hud-stat span { color: #00f2fe; }

        #build-menu { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .build-btn { display: flex; flex-direction: column; align-items: center; background: rgba(30, 40, 50, 0.9); padding: 10px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border 0.2s; }
        .build-btn:hover { border-color: #4facfe; }
        .build-btn.selected { border-color: #00f2fe; background: rgba(60, 80, 100, 0.9); }
        .build-icon { width: 40px; height: 40px; border-radius: 5px; margin-bottom: 5px; }
        .icon-laser { background: #ff4757; }
        .icon-cannon { background: #ffa502; }
        .icon-slow { background: #1e90ff; }

        #wave-status { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        #wave-btn { font-size: 1rem; padding: 8px 16px; }

        #upgrade-panel { position: absolute; top: 50%; right: 20px; transform: translateY(-50%); width: 250px; display: flex; flex-direction: column; gap: 10px; }
        
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.166.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.166.0/examples/jsm/",
            "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
            "zortengine": "../../../src/engine/index.js",
            "zortengine/browser": "../../../src/adapters/browser/index.js",
            "zortengine/gameplay": "../../../src/gameplay/index.js",
            "zortengine/physics": "../../../src/adapters/physics/index.js",
            "zortengine/render": "../../../src/adapters/render/index.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div id="main-menu" class="panel">
            <h1>ISOMETRIC TD</h1>
            <button id="btn-start" class="btn">START GAME</button>
        </div>

        <div id="hud" class="panel hidden">
            <div class="hud-stat">HP: <span id="val-hp">100</span></div>
            <div class="hud-stat">GOLD: $<span id="val-gold">500</span></div>
            <div class="hud-stat">WAVE: <span id="val-wave">1</span></div>
        </div>

        <div id="wave-status" class="hidden">
            <button id="btn-next-wave" class="btn panel">START WAVE</button>
        </div>

        <div id="build-menu" class="panel hidden">
            <div class="build-btn" data-type="laser">
                <div class="build-icon icon-laser"></div>
                <span>Laser ($100)</span>
            </div>
            <div class="build-btn" data-type="cannon">
                <div class="build-icon icon-cannon"></div>
                <span>Cannon ($200)</span>
            </div>
            <div class="build-btn" data-type="slow">
                <div class="build-icon icon-slow"></div>
                <span>Slow ($150)</span>
            </div>
        </div>

        <div id="upgrade-panel" class="panel hidden">
            <h3 id="upg-title" style="margin:0 0 10px 0;">Tower</h3>
            <div style="font-size:0.9rem; color:#ccc; margin-bottom:15px;">Lvl <span id="upg-lvl">1</span> | Dmg: <span id="upg-dmg">10</span></div>
            <button id="btn-upgrade" class="btn" style="width:100%; font-size:1rem;">UPGRADE ($<span id="upg-cost">50</span>)</button>
            <button id="btn-sell" class="btn" style="width:100%; font-size:1rem; background: #ff4757; margin-top: 5px;">SELL</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
