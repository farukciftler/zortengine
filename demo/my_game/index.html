<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zortengine Demo Oyunu</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #000; 
        }
        canvas { 
            display: block; 
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
    
    <!-- Modern İçe Aktarma Haritası (Import Map) -->
    <!-- Bu sayede üç boyutlu objeler birbirinin modüllerini sorunsuz bulur -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui">
        <h2>Zortengine Demo</h2>
        <p>Hareket: WASD veya Ok Tuşları<br>Atak (Test): Boşluk (Space)</p>
    </div>
    <!-- Modüler giriş noktamız -->
    <script type="module" src="main.js"></script>
</body>
</html>
